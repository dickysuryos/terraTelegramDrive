version: '3.8'

services:
  app:
    build: .
    container_name: terra-telegram-drive-app
    restart: always
    ports:
      - "8038:8038"
    env_file:
      - .env
    volumes:
      - telegram_bot_data:/var/lib/telegram-bot-api

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: terra-telegram-bot-api
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - telegram_bot_data:/var/lib/telegram-bot-api
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1

volumes:
  telegram_bot_data:

