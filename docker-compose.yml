version: '3.8'

services:
  app:
    build: .
    container_name: terra-telegram-drive-app
    restart: always
    ports:
      - "8038:8038"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    container_name: terra-telegram-drive-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Niken@dk271
      MYSQL_DATABASE: telegram_drive
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
